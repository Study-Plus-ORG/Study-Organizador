<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Study+ | Organizador de Estudos</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body class="body1">
  <script type="module">
    import { auth } from './firebase.js';
    import { signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

    onAuthStateChanged(auth, (user) => {
      if (!user) window.location.href = 'login.html';
    });

    document.querySelector('header a').addEventListener('click', async (e) => {
      e.preventDefault();
      await signOut(auth);
      window.location.href = 'login.html';
    });
  </script>
<header><a href="index.html"><img src="img/porta.png" class="sair" alt="Sair"></a></header>
<main class="container">
  
  <section class="card">
    <div class="card-header drag-handle">
      <div class="drag-lines">
        <div class="line-short"></div>
        <div class="line-long"></div>
      </div>
    </div>
    <div class="card-content">
      <h2>Planejamento do Dia</h2>
      <ul>
        <li>Matemática - 1h</li>
        <li>História - 40min</li>
        <li>Revisão de Inglês</li>
      </ul>
    </div>
    <div class="card-footer">
      <button class="pin-btn" data-pinned="false">📌</button>
    </div>
  </section>

  <section class="card">
    <div class="card-header drag-handle">
      <div class="drag-lines">
        <div class="line-short"></div>
        <div class="line-long"></div>
      </div>
    </div>
    <div class="card-content">
      <h2>Matérias</h2>
      <ul>
        <li>Matemática</li>
        <li>Português</li>
        <li>História</li>
        <li>Geografia</li>
      </ul>
    </div>
    <div class="card-footer">
      <button class="pin-btn" data-pinned="false">📌</button>
    </div>
  </section>

  <section class="card">
    <div class="card-header drag-handle">
      <div class="drag-lines">
        <div class="line-short"></div>
        <div class="line-long"></div>
      </div>
    </div>
    <div class="card-content">
      <h2>Tarefas</h2>
      <div class="taskInput">
        <input type="text" id="novaTarefa" placeholder="Nova tarefa..." />
        <button class="btn-add" onclick="addTarefa()">Adicionar</button>
      </div>
      <ul id="listaTarefas">
        <li onclick="remover(this)">✔ Fazer exercícios de matemática</li>
        <li onclick="remover(this)">✔ Ler capítulo de história</li>
      </ul>
    </div>
    <div class="card-footer">
      <button class="pin-btn" data-pinned="false">📌</button>
    </div>
  </section>
  <!-- interessante deixar o usuario criar um card proprio -->
<!-- <button onclick="toggleCard()">Mostrar / Esconder Card</button> -->


  <section class="card whiteboardCard">
    <div class="card-header drag-handle">
      <div class="drag-lines">
        <div class="line-short"></div>
        <div class="line-long"></div>
      </div>
    </div>
    <div class="card-content">
      <h2>Whiteboard</h2>
      <canvas id="board"></canvas>
      <div class="boardButtons">
        <button onclick="limparCanvas()">Limpar</button>
      </div>
    </div>
    <div class="card-footer">
      <button class="pin-btn" data-pinned="false">📌</button>
    </div>
  </section>

  <section class="card">
    <div class="card-header drag-handle">
      <div class="drag-lines">
        <div class="line-short"></div>
        <div class="line-long"></div>
      </div>
    </div>
    <div class="card-content">
      <h2>Google Agenda</h2>
      <div id="google-signin" style="text-align:center; padding: 1rem 0;">
        <button onclick="loginGoogle()" class="btn-google">Conectar Google Agenda</button>
      </div>
      <ul id="listaEventos" style="display:none;"></ul>
    </div>
    <div class="card-footer">
      <button class="pin-btn" data-pinned="false">📌</button>
    </div>
  </section>

</main>
<footer>Study+ © 2026</footer>
<script src="script.js"></script>
<script src="https://apis.google.com/js/api.js"></script>
<script src="https://accounts.google.com/gsi/client"></script>
<script src="agenda.js"></script>
</body>
</html>
