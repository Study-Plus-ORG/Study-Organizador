<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Study+ | Login</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
</head>
<body class="cadastro-body">
  <div class="cadastro-container">
    <div class="cadastro-card">
      <h1 class="landing-logo">Study<span>+</span></h1>
      <p class="cadastro-tagline">Bem-vindo de volta!</p>

      <form class="cadastro-form" id="formLogin">
        <div class="input-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" placeholder="seu@email.com" required>
        </div>

        <div class="input-group">
          <label for="senha">Senha</label>
          <div class="senha-container">
          <input type="password" id="senha" placeholder="••••••" required>
          <span class="olho" onclick="toggleSenha('senha', this)">👁️</span>
          </div>
        </div>

        <p style="text-align:right; margin-top:-0.5rem;">
          <a href="recuperar.html" style="color:#ffbd59; font-size:0.85rem; text-decoration:none;">Esqueceu a senha?</a>
        </p>

        <button type="submit" class="btn-cadastrar">Entrar →</button>
      </form>

      <p class="login-link">Não tem uma conta? <a href="cadastro.html">Cadastre-se</a></p>
    </div>
    <div class="cadastro-footer">
      <span>🚀 Estude com foco e organização</span>
    </div>
  </div>

  <script type="module">
import { auth, db } from './firebase.js';
import {
  signInWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

import {
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

async function verificarAdmin(user) {
  const adminRef = doc(db, "admins", user.uid);
  const adminSnap = await getDoc(adminRef);

  if (adminSnap.exists()) {
    window.location.href = "admin.html";
  } else {
    window.location.href = "principal.html";
  }
}

onAuthStateChanged(auth, async (user) => {
  if (user) {
    await verificarAdmin(user);
  }
});

document.getElementById('formLogin').addEventListener('submit', async (e) => {
  e.preventDefault();

  const email = document.getElementById('email').value;
  const senha = document.getElementById('senha').value;

  try {
    const credencial = await signInWithEmailAndPassword(auth, email, senha);
    await verificarAdmin(credencial.user);
  } catch (erro) {
    alert('E-mail ou senha incorretos.');
  }
});
</script>
  <script>
    function toggleSenha(id, elemento) {
    const campo = document.getElementById(id);

    if (campo.type === 'password') {
        campo.type = 'text';
        elemento.textContent = '🙈';
    } else {
        campo.type = 'password';
        elemento.textContent = '👁️';
    }
}
</script>
</body>
</html>
