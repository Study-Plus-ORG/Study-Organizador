<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Study+ | Criar conta</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
</head>
<body class="cadastro-body">
    <div class="cadastro-container">
        <div class="cadastro-card">
            <h1 class="landing-logo">Study<span>+</span></h1>
            <p class="cadastro-tagline">Crie sua conta e organize seus estudos</p>

            <form class="cadastro-form" id="formCadastro">
                <div class="input-group">
                    <label for="nome">Nome completo</label>
                    <input type="text" id="nome" placeholder="Seu nome" required>
                </div>
                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>
                <div class="input-group">
                    <label for="senha">Senha</label>
                    <div class="senha-container">
                    <input type="password" id="senha" placeholder="••••••" required>
                    <span class="olho" onclick="toggleSenha('senha', this)">👁️</span>
                    </div>
                </div>

                <div class="input-group">
                    <label for="confirmar">Confirmar senha</label>
                    <div class="senha-container">
                    <input type="password" id="confirmar" placeholder="••••••" required>
                    <span class="olho" onclick="toggleSenha('confirmar', this)">👁️</span>
                    </div>
                </div>

                <button type="submit" class="btn-cadastrar">Cadastrar →</button>
            </form>

            <p class="login-link">Já tem uma conta? <a href="login.html">Faça login</a></p>
        </div>
        <div class="cadastro-footer">
            <span>🚀 Estude com foco e organização</span>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase.js';
        import { createUserWithEmailAndPassword, updateProfile, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
        import { doc, setDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        onAuthStateChanged(auth, (user) => {
            if (user) window.location.href = 'principal.html';
        });

        document.getElementById('formCadastro').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const confirmar = document.getElementById('confirmar').value;

            if (senha !== confirmar) {
                alert('As senhas não coincidem.');
                return;
            }

            try {
                const cred = await createUserWithEmailAndPassword(auth, email, senha);
                await updateProfile(cred.user, { displayName: nome });
                await setDoc(doc(db, 'usuarios', cred.user.uid), {
                    nome,
                    email,
                    pontos: 0,
                    nivel: 1,
                    criadoEm: new Date()
                });
                window.location.href = 'principal.html';
            } catch (erro) {
                if (erro.code === 'auth/email-already-in-use') {
                    alert('Este e-mail já está cadastrado.');
                } else if (erro.code === 'auth/weak-password') {
                    alert('A senha deve ter pelo menos 6 caracteres.');
                } else {
                    alert('Erro ao cadastrar. Tente novamente.');
                }
            }
        });
    </script>
    <script>
function toggleSenha(id, elemento) {
    const campo = document.getElementById(id);

    if (campo.type === 'password') {
        campo.type = 'text';
        elemento.textContent = '🙈';
    } else {
        campo.type = 'password';
        elemento.textContent = '👁️';
    }
}
</script>
</body>
</html>
